<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio Walter</title>
<style type="text/css">
  * {
    box-sizing: border-box;
  }
  body {
    margin: 0;
    padding: 0;
    background-color: #ffffff;
    color: #000000;
    font-family: Arial, Helvetica, sans-serif;
    text-align: center;
  }
  table.stage {
    width: 1024px;
    height: 768px;
    margin: 0 auto;
    border-collapse: collapse;
  }
  table.stage td {
    text-align: center;
    vertical-align: middle;
  }
  #dial {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background-color: #444444;
    border: 3px solid #000000;
    margin: 0 auto 18px auto;
  }
  #dial.live {
    background-color: #ff7a00;
    -webkit-animation: blink 1.2s ease-in-out infinite;
    animation: blink 1.2s ease-in-out infinite;
  }
  @-webkit-keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.25; }
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.25; }
  }
  #nowPlaying {
    font-size: 32px;
    font-weight: bold;
    color: #cc5200;
    margin: 0 0 20px 0;
    letter-spacing: 0.5px;
    min-height: 40px;
  }
  #nowPlaying.off {
    color: #000000;
  }
  table.panel {
    margin: 0 auto;
    width: 980px;
    border-collapse: collapse;
  }
  .stopBtn {
    display: block;
    width: 100%;
    background-color: #cc0000;
    border: 4px solid #ffffff;
    color: #ffffff;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 28px;
    font-weight: bold;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 18px 10px;
    cursor: pointer;
    margin-bottom: 16px;
  }
  .stopBtn.playMode {
    background-color: #007a1f;
  }
  .stopBtn:focus {
    outline: 5px solid #cc5200;
    outline-offset: 3px;
  }
  table.stations {
    width: 980px;
    border-collapse: separate;
    border-spacing: 12px;
  }
  table.stations td {
    width: 33.33%;
    height: 168px;
    padding: 0;
  }
  .stationBtn {
    display: table;
    width: 100%;
    height: 168px;
    background-color: #ffffff;
    border: 4px solid #000000;
    color: #000000;
    font-family: Arial, Helvetica, sans-serif;
    padding: 12px 16px;
    cursor: pointer;
    text-align: left;
  }
  .stationBtn:focus {
    outline: 5px solid #cc5200;
    outline-offset: 3px;
  }
  .stationBtn.active {
    background-color: #ff7a00;
    border-color: #ff7a00;
  }
  .stationNum {
    display: table-cell;
    vertical-align: middle;
    font-size: 48px;
    font-weight: bold;
    color: #cc5200;
    width: 70px;
    line-height: 1;
    text-align: center;
    padding-right: 14px;
  }
  .stationBtn.active .stationNum {
    color: #000000;
  }
  .stationText {
    display: table-cell;
    vertical-align: middle;
    font-size: 28px;
    font-weight: bold;
    line-height: 1.2;
  }
  .stationBtn.active .stationText {
    color: #000000;
  }
  /* Fluid fallback on very small screens */
  @media (max-width: 480px) {
    table.stage {
      width: 100%;
      height: auto;
    }
    table.panel {
      width: 100%;
    }
    table.stations {
      width: 100%;
    }
    table.stations, table.stations tbody, table.stations tr, table.stations td {
      display: block;
      width: 100% !important;
      height: auto !important;
    }
    table.stations td {
      margin-bottom: 12px;
    }
    .stationBtn {
      width: 100%;
      height: auto;
    }
  }
</style>
</head>
<body>

<table class="stage" cellpadding="0" cellspacing="0">
<tr><td>

<div id="dial"></div>

<div id="nowPlaying" class="off">Kein Sender aktiv</div>

<table class="panel" cellpadding="0" cellspacing="0" align="center">
<tr><td>

  <button type="button" class="stopBtn playMode" id="stopBtn" onclick="toggleStopPlay()">Play</button>

  <table class="stations" cellpadding="0" cellspacing="0">
    <tr>
      <td><button type="button" class="stationBtn" id="btn0" onclick="playStation(0)"><span class="stationNum">1</span><span class="stationText">Recuerdos de Uyuni</span></button></td>
      <td><button type="button" class="stationBtn" id="btn1" onclick="playStation(1)"><span class="stationNum">2</span><span class="stationText">Felicidad Uyuni</span></button></td>
      <td><button type="button" class="stationBtn" id="btn2" onclick="playStation(2)"><span class="stationNum">3</span><span class="stationText">BR Heimat</span></button></td>
    </tr>
    <tr>
      <td><button type="button" class="stationBtn" id="btn3" onclick="playStation(3)"><span class="stationNum">4</span><span class="stationText">Klassik</span></button></td>
      <td><button type="button" class="stationBtn" id="btn4" onclick="playStation(4)"><span class="stationNum">5</span><span class="stationText">ORF Salzburg</span></button></td>
      <td><button type="button" class="stationBtn" id="btn5" onclick="playStation(5)"><span class="stationNum">6</span><span class="stationText">Bayern 2</span></button></td>
    </tr>
    <tr>
      <td><button type="button" class="stationBtn" id="btn6" onclick="playStation(6)"><span class="stationNum">7</span><span class="stationText">PIO XII Cochabamba</span></button></td>
      <td><button type="button" class="stationBtn" id="btn7" onclick="playStation(7)"><span class="stationNum">8</span><span class="stationText">Arabella Muenchen</span></button></td>
      <td><button type="button" class="stationBtn" id="btn8" onclick="playStation(8)"><span class="stationNum">9</span><span class="stationText">Absolut Relax</span></button></td>
    </tr>
  </table>

</td></tr>
</table>

</td></tr>
</table>

<audio id="player" preload="none"></audio>

<script type="text/javascript">
  var stationNames = [
    "Recuerdos de Uyuni",
    "Felicidad Uyuni",
    "BR Heimat",
    "Klassik",
    "ORF Salzburg",
    "Bayern 2",
    "PIO XII Cochabamba",
    "Arabella Muenchen",
    "Absolut Relax"
  ];

  var stationUrls = [
    "https://emiteradio.com/proxy/uyuni2?mp=/stream?n=3f5b38c8d2f05fe17237",
    "https://streaming5.locucionar.com/proxy/felicidaduyuni?mp=/stream",
    "https://dispatcher.rndfnk.com/br/brheimat/live/mp3/mid",
    "https://stream.klassikradio.de/national/mp3-192/",
    "https://orf-live.ors-shoutcast.at/sbg-q2a",
    "https://dispatcher.rndfnk.com/br/br2/live/mp3/mid",
    "https://aler.org:8445/pio12cbba.mp3",
    "https://live.stream.radioarabella.de/radioarabella-muenchen/stream/mp3",
    "https://absolut-relax.live-sm.absolutradio.de/absolut-relax/stream/mp3"
  ];

  var activeIndex = -1;
  var lastPlayedIndex = 0;

  function setActiveButton(index) {
    var i;
    for (i = 0; i < stationNames.length; i++) {
      var btn = document.getElementById("btn" + i);
      if (btn) {
        btn.className = (i === index) ? "stationBtn active" : "stationBtn";
      }
    }
  }

  function setNowPlaying(text, isOff) {
    var el = document.getElementById("nowPlaying");
    el.innerHTML = "";
    el.appendChild(document.createTextNode(text));
    el.className = isOff ? "off" : "";
  }

  function setStopBtnLabel(text, isPlayMode) {
    var btn = document.getElementById("stopBtn");
    btn.innerHTML = "";
    btn.appendChild(document.createTextNode(text));
    btn.className = isPlayMode ? "stopBtn playMode" : "stopBtn";
  }

  function toggleStopPlay() {
    if (activeIndex === -1) {
      playStation(lastPlayedIndex);
    } else {
      stopStation();
    }
  }

  function playStation(index) {
    var player = document.getElementById("player");
    var url = stationUrls[index];
    var name = stationNames[index];

    player.pause();
    player.setAttribute("src", url);
    player.load();

    try {
      var p = player.play();
      if (p && typeof p.then === "function") {
        p.then(function () {
          /* playback started fine */
        }, function () {
          setNowPlaying("Wiedergabe fehlgeschlagen: " + name, true);
        });
      }
    } catch (e) {
      setNowPlaying("Wiedergabe fehlgeschlagen: " + name, true);
      return;
    }

    activeIndex = index;
    lastPlayedIndex = index;
    setActiveButton(index);
    setNowPlaying(name, false);
    setStopBtnLabel("Stopp", false);
    document.getElementById("dial").className = "live";
  }

  function stopStation() {
    var player = document.getElementById("player");
    player.pause();
    player.removeAttribute("src");
    player.load();

    activeIndex = -1;
    setActiveButton(-1);
    setNowPlaying("Kein Sender aktiv", true);
    setStopBtnLabel("Play", true);
    document.getElementById("dial").className = "";
  }
</script>

</body>
</html>
